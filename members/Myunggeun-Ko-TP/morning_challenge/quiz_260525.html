        problem: `<p>1以上の整数 <em>a</em>, <em>b</em> について、<em>a</em>/<em>b</em> の切り上げを計算するC言語の関数を考える。</p>

    return /* [ BLANK ] */;

<p><code>[ BLANK ]</code> に入る式として、<strong>誤っている</strong>ものはどれか？ただし、C言語における <code>x / y</code> は、整数 <em>x</em> を <em>y</em> で割った商（小数点以下は切り捨て）である。</p>`,

<pre><code class="language-c">#include &lt;stdbool.h&gt; // bool, true, false を使うために必要

bool f(bool a, bool b) {
    return (a &amp;&amp; !b) || (!a &amp;&amp; b);
}

bool g(bool a, bool b) {

<ul>

  <li><code>!(!a || b) || !(a || !b)</code>：ド・モルガンの法則により <code>(a &amp;&amp; !b) || (!a &amp;&amp; b)</code> と変形でき、<code>f</code> と等価。</li>
  <li><code>a ^ b</code>：C言語のビット単位XOR演算子。<code>bool</code> 値（0 または 1）に対してはXORと同じ結果になります。等価。</li>

<p>1つ目が等価でないため、「全てで等価になる」は誤りです。</p>`

<pre><code class="language-c">int median(int a, int b, int c) {
    if (b &lt;= a &amp;&amp; a &lt;= c) return a;
    if (c &lt;= a &amp;&amp; a &lt;= b) return a;

<p>安全にするには最後の <code>if</code> を <code>else</code> に置き換えるか、関数の末尾にデフォルトの <code>return</code> 文を追加します。</p>

  <li>選択肢4：文法的に誤りはありません。</li>

<p>以下は、組の対応関係を崩さずに、「A[i] の昇順、A[i] が等しい場合は B[i] の昇順」となるように2つの配列を同時に並べ替える（バブルソート）C言語のプログラムです。空欄 <code>[ ア ]</code> に入る式として適切なものを選んでください。</p>
<pre><code class="language-c">#define N 100
int A[N], B[N];

void sort_pairs() {
    for (int i = 0; i &lt; N; i++) {
        for (int j = 0; j &lt; N - 1; j++) {
            if ([ ア ]) {

<ol>

</ol>
<p>これらを <code>||</code> で結合したものが正解です。</p>

  <li><code>length</code> が 0 の場合：<code>i &lt; length</code> が最初から偽となりループに入らず、-1 を返します。異常終了はしません。誤り。</li>
  <li>複数含まれている場合：最初に見つかった位置だけを <code>return i;</code> で返して関数を終了します。全インデックスは返しません。誤り。</li>
  <li>戻り値が必ず 1 以上：<code>i = 0</code> で見つかった場合は <code>return 0;</code> となるため誤り。また見つからない場合は &minus;1 を返します。</li>
</ul>`
      },
      {
        num: 18,
        title: "配列のソート (C言語)",
        problem: `<p>整数型配列 <code>a</code> を<strong>降順</strong>（大きい順）にソートするバブルソート関数がある。配列の要素数は <code>n</code> とします。空欄 <code>[ ア ]</code> に入る比較条件として正しいものはどれか。</p>
<pre><code class="language-c">void sort_desc(int a[], int n) {
    for (int i = 0; i &lt; n - 1; i++) {
        for (int j = 0; j &lt; n - 1 - i; j++) {
            if ([ ア ]) {
                int temp = a[j];
                a[j] = a[j+1];
                a[j+1] = temp;
            }
        }
    }
}</code></pre>`,
        choices: [
          '<code>a[j] &gt; a[j+1]</code>',
          '<code>a[j] &lt; a[j+1]</code>',
          '<code>a[j] == a[j+1]</code>',
          '<code>a[j] &gt;= a[j+1]</code>'
        ],
        multiple: false,
        correctIndices: [1],
        exp: `<p><strong>降順</strong>（大きい順）ソートでは、左の要素が右より<strong>小さい</strong>場合に交換することで、大きい値が前に移動します。</p>
<ul>
  <li><code>a[j] &gt; a[j+1]</code>：昇順ソートの条件。逆になります。誤り。</li>
  <li><code>a[j] &lt; a[j+1]</code>：左が右より小さい → 逆順なので交換 → <strong>正解（降順）</strong>。</li>
  <li><code>a[j] == a[j+1]</code>：等しい場合のみ交換。ソートになりません。誤り。</li>
  <li><code>a[j] &gt;= a[j+1]</code>：等値でも交換するため無駄な操作が増え、かつ昇順にならない。誤り。</li>

      },
      {
        num: 19,
        title: "切り捨て除算 (C言語)",
        problem: `<p>1以上の整数 <em>a</em>, <em>b</em> について、<em>a</em>/<em>b</em> の<strong>切り捨て</strong>を計算するC言語の式を考える。</p>
<pre><code class="language-c">int floor_div(int a, int b) {
    return [ BLANK ];
}</code></pre>
<p><code>[ BLANK ]</code> に入る式として、<strong>正しいもの</strong>はどれか？ただし、C言語における <code>x / y</code>（x, y は正の整数）は、小数点以下を切り捨てた商を返す。</p>`,
        choices: [
          '<code>a / b - 1</code>',
          '<code>a / b</code>',
          '<code>(a - 1) / b</code>',
          '<code>(a + b - 1) / b</code>'
        ],
        multiple: false,
        correctIndices: [1],
        exp: `<p>C言語では、正の整数同士の <code>/</code> 演算は<strong>切り捨て除算</strong>（小数点以下を切り捨てた商）を返します。そのため <code>a / b</code> がそのまま切り捨て除算の結果です。</p>
<ul>
  <li><code>a / b - 1</code>：切り捨てた結果からさらに 1 を引いてしまいます。誤り。</li>
  <li><code>a / b</code>：正の整数同士の整数除算 = 切り捨て。<strong>正解</strong>。</li>
  <li><code>(a - 1) / b</code>：切り上げ計算のために用いる式であり、切り捨てとは異なります。誤り。</li>
  <li><code>(a + b - 1) / b</code>：切り上げ除算の計算式です。誤り。</li>
</ul>`
      },
      {
        num: 20,
        title: "入出力 (C言語)",
        problem: `<p>以下のコードは、標準入力から文字列を受け取り、特定の条件で出力を行うC言語のプログラムである。このプログラムの挙動に関する記述として、<strong>正しいもの</strong>を選べ。</p>
<pre><code class="language-c">#include &lt;stdio.h&gt;
#include &lt;string.h&gt;

int main(void) {
    char s[100];
    while (1) {
        if (scanf("%99s", s) != 1) {
            break;
        }
        if (strcmp(s, "quit") == 0) {
            break;
        } else {
            printf("echo: %s\n", s);
        }
    }
    return 0;
}</code></pre>`,
        choices: [
          '文字列 <code>Quit</code>（<code>quit</code> ではないことに注意）を入力すると、プログラムが終了する。',
          '文字列 <code>quitting</code> を入力しても、プログラムは終了する。',
          '文字列 <code>hello</code> を入力すると、<code>echo: hello</code> と表示し、次の入力を待つ（ループする）。',
          '文字列 <code>quit</code> を入力すると、<code>echo: quit</code> と表示してからプログラムが終了する。'
        ],
        multiple: false,
        correctIndices: [2],
        exp: `<ul>
  <li><code>Quit</code> を入力：<code>strcmp(s, "quit")</code> は大文字・小文字を区別するため、<code>"Quit"</code> は <code>"quit"</code> と一致せず、<code>echo: Quit</code> と表示してループを続けます。終了しません。誤り。</li>
  <li><code>quitting</code> を入力：<code>"quitting"</code> は <code>"quit"</code> と一致しないため、<code>echo: quitting</code> と表示してループを続けます。誤り。</li>
  <li><code>hello</code> を入力：<code>"quit"</code> と一致しないため、<code>echo: hello</code> と表示して次の入力を待ちます。<strong>正解</strong>。</li>
  <li><code>quit</code> を入力：<code>strcmp(s, "quit") == 0</code> が真となり <code>break</code> でループを抜けます。<code>printf</code> は実行されません。誤り。</li>
</ul>`
      }
    ];

    // 正解インデックス（0ベース）
    const ANSWER_KEY = QUESTIONS.map(q => q.correctIndices);
    const DATE = '260525';
    const TOTAL_SEC = 20 * 60;
    let remaining = TOTAL_SEC;
    let timerInterval = null;
    let submitted = false;
    let resultData = null;

    function buildQuiz() {
      const area = document.getElementById('quiz-area');
      area.innerHTML = '';
      QUESTIONS.forEach((q, qi) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = 'card-' + qi;

        const inputType = q.multiple ? 'checkbox' : 'radio';
        const multiHint = q.multiple
          ? '<div class="multi-hint">※ 正しいものをすべて選んでください</div>'
          : '';

        const choicesHtml = q.choices.map((c, ci) => {
          return '<label class="choice-label" id="lbl-' + qi + '-' + ci + '">'
            + '<input type="' + inputType + '" name="q' + qi + '" value="' + ci + '" onchange="onAnswer(' + qi + ')">'
            + '<div class="choice-text">' + c + '</div>'
            + '</label>';
        }).join('');

        card.innerHTML =
          '<div class="q-num">問 ' + q.num + '</div>'
          + '<div class="q-title">' + q.title + '</div>'
          + '<div class="q-problem" id="prob-' + qi + '">' + q.problem + '</div>'
          + multiHint
          + '<div class="choices">' + choicesHtml + '</div>'
          + '<div class="q-exp" id="exp-' + qi + '"><div class="exp-label">✅ 解説</div><div id="exp-body-' + qi + '">' + q.exp + '</div></div>';

        area.appendChild(card);
      });

      // highlight.js によるコードブロックの構文強調
      if (typeof hljs !== 'undefined') {
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      }
    }

    function onAnswer(qi) {
      document.querySelectorAll('label[id^="lbl-' + qi + '-"]').forEach(lbl => {
        lbl.classList.toggle('selected', lbl.querySelector('input').checked);
      });
      updateAnsweredCount();
    }

    function getAnswered(qi) {
      return [...document.querySelectorAll('input[name="q' + qi + '"]')]
        .filter(i => i.checked).map(i => +i.value);
    }

    function updateAnsweredCount() {
      const answered = QUESTIONS.filter((_, qi) => getAnswered(qi).length > 0).length;
      document.getElementById('ans-num').textContent = answered;
    }

    function startTimer() {
      const timerEl = document.getElementById('timer');
      const fillEl  = document.getElementById('progress-fill');
      timerInterval = setInterval(() => {
        remaining--;
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
        fillEl.style.width = (remaining / TOTAL_SEC * 100) + '%';
        if (remaining <= 300) timerEl.className = 'warn';
        if (remaining <= 60)  timerEl.className = 'danger';
        if (remaining <= 0)   { clearInterval(timerInterval); doSubmit(); }
      }, 1000);
    }

    function doSubmit() {
      if (submitted) return;
      submitted = true;
      clearInterval(timerInterval);

      const name = document.getElementById('student-name').value.trim() || 'anonymous';
      const ts   = new Date().toTimeString().slice(0, 8);
      let score  = 0;
      const answers = {}, results = {};

      QUESTIONS.forEach((q, qi) => {
        const chosen  = getAnswered(qi).sort((a,b) => a-b);
        const correct = ANSWER_KEY[qi].slice().sort((a,b) => a-b);
        const isOK    = JSON.stringify(chosen) === JSON.stringify(correct);
        if (isOK) score++;
        answers['q' + q.num] = chosen;
        results['q' + q.num] = isOK;

        // 選択肢の色付け
        q.choices.forEach((_, ci) => {
          const lbl = document.getElementById('lbl-' + qi + '-' + ci);
          if (!lbl) return;
          lbl.querySelector('input').disabled = true;
          const isCorrectChoice = ANSWER_KEY[qi].includes(ci);
          const isChosen = chosen.includes(ci);
          if (isCorrectChoice) lbl.classList.add('correct');
          else if (isChosen)   lbl.classList.add('wrong');
        });

        // 解説を表示
        document.getElementById('exp-' + qi).classList.add('show');
      });

      resultData = { date: DATE, name, submitted_at: ts, score, total: QUESTIONS.length, answers, results };

      const pct = Math.round(score / QUESTIONS.length * 100);
      document.getElementById('score-display').textContent = score + ' / ' + QUESTIONS.length;
      document.getElementById('result-msg').textContent =
        '正答率 ' + pct + '%　' +
        (pct >= 80 ? '素晴らしい！' : pct >= 60 ? 'もう少し！' : '復習しよう！');
      document.getElementById('result-overlay').classList.add('show');
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('reshow-btn').style.display = '';
      document.getElementById('dl-footer-btn').style.display = '';

      // 再highlight（解説内コードブロック）
      if (typeof hljs !== 'undefined') {
        document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
      }
    }

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (submitted) return;
      const answeredCount = QUESTIONS.filter((_, qi) => getAnswered(qi).length > 0).length;
      if (answeredCount < QUESTIONS.length) {
        if (!confirm('未回答の問題が ' + (QUESTIONS.length - answeredCount) + ' 問あります。このまま提出しますか？')) return;
      }
      doSubmit();
    });

    document.getElementById('close-btn').addEventListener('click', () => {
      document.getElementById('result-overlay').classList.remove('show');
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      if (!resultData) return;
      const blob = new Blob([JSON.stringify(resultData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'result_' + DATE + '_' + resultData.name + '.json';
      a.click();
    });

    // DOMロード後に実行
    window.addEventListener('load', () => {
      buildQuiz();
      startTimer();
    });
  </script>
</body>
</html>
